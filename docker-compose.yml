services:
  komiko:
    build: .
    container_name: komiko
    restart: unless-stopped
    ports:
      - "${KOMIKO_PORT:-5000}:5000"
    volumes:
      - ${KOMIKO_DATA_DIR:-./data}:/data
      - ${KOMIKO_COMICS_DIR:-/comics}:/comics:ro
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FLASK_ENV=production
      - KOMIKO_DATA_DIR=/data